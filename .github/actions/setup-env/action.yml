name: Common Prepare
description: "Node, pnpm, .NET setup and install dependencies"

inputs:
  path:
    required: false
    type: string

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          6.0.x
          8.0.x

    - name: Install dependencies
      working-directory: ${{ inputs.path }}
      shell: bash
      run: pnpm install --frozen-lockfile
